<h4 class="mb-3">Add Employee</h4>

<form (ngSubmit)="addEmployee()" #empForm="ngForm">

  <div class="mb-3">
    <label class="form-label">Employee ID</label>
    <input type="text"
           class="form-control"
           name="employee_id"
           [(ngModel)]="employee.employee_id"
           required>
  </div>

  <div class="mb-3">
    <label class="form-label">Full Name</label>
    <input type="text"
           class="form-control"
           name="full_name"
           [(ngModel)]="employee.full_name"
           required>
  </div>

  <div class="mb-3">
    <label class="form-label">Email</label>
    <input type="email"
           class="form-control"
           name="email"
           [(ngModel)]="employee.email"
           required>
  </div>

  <div class="mb-3">
    <label class="form-label">Department</label>
    <input type="text"
           class="form-control"
           name="department"
           [(ngModel)]="employee.department">
  </div>

  <button class="btn btn-primary"
          type="submit"
          [disabled]="empForm.invalid">
    Add Employee
  </button>

</form>
